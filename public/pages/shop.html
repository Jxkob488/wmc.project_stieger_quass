<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop</title>
    <link rel="stylesheet" href="../css/online-shop.css">
</head>

<body>

    <header>
        <h1>Willkommen im Online Shop</h1>
        <p>Wähle deine Favoriten aus und verwende den Warenkorb, um schnell zu bestellen.</p>
    </header>

    <main class="shop-page">
        <div class="shop-container">
            <div class="products-column">
                <section class="page-intro">
                    <p>Unsere Produkte werden automatisch geladen. Klicke auf „In den Warenkorb“, um sie deiner Bestellung hinzuzufügen.</p>
                </section>
                <div id="product-list"></div>
            </div>
            <aside class="cart-panel">
                <section id="cart"></section>
            </aside>
        </div>
    </main>

    <script type="module" src="../js/shop.js"></script>
</body>

</html>
