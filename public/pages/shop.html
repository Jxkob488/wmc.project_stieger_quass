<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop</title>
    <link rel="stylesheet" href="../css/online-shop.css">
</head>

<body>

    <header>
        <h1>Welcome to Online Shop</h1>
        <p>Choose your favorite items and use the shopping cart to place your order quickly.</p>
    </header>

    <main class="shop-page">
        <div class="shop-container">
            <div class="products-column">
                <section class="page-intro">
                    <p>Our products are loaded automatically. Click on "Add to Cart" to add them to your order.</p>
                </section>
                <div id="product-list"></div>
            </div>
            <aside class="cart-panel">
                <section id="cart"></section>
            </aside>
        </div>
    </main>

    <script type="module" src="../js/shop.js"></script>
</body>

</html>
