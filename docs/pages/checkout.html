<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/online-shop.css">
</head>

<body>
    <header>
        <h1>Checkout</h1>
        <p>Check your order and enter your contact details.</p>
    </header>

    <main class="shop-page checkout-page">
        <div class="checkout-layout">
            <section class="checkout-card">
                <h2>Customer Information</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="max@example.com">
                        <div class="error-message" id="email-error"></div>
                    </div>

                    <div class="checkout-actions">
                        <button type="submit">Send Order Email</button>
                        <a href="/pages/shop.html" class="secondary-link">Back to Shop</a>
                    </div>
                </form>

                <div class="success-message" id="success-message" aria-live="polite"></div>
            </section>

            <aside class="checkout-card">
                <h2>Order Summary</h2>
                <div id="order-summary"></div>
            </aside>
        </div>
    </main>

    <script src="../js/checkout.js"></script>
</body>

</html>
